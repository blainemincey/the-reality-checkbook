# Dev compose: runs Postgres only. The app runs on the host via `pnpm dev`
# for fast reload. See docker-compose.prod.yml for the production bundle.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-checkregister}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong}
      POSTGRES_DB: ${POSTGRES_DB:-checkregister}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-checkregister}']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
