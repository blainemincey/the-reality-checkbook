# Portainer stack for the home-NAS deployment.
# Pulls a prebuilt image from GHCR (published by .github/workflows/docker-publish.yml);
# the NAS does not build anything.
#
# In Portainer:
#   1. Stacks -> Add stack -> Repository
#         Repository URL:    https://github.com/blainemincey/the-reality-checkbook
#         Compose path:      docker-compose.portainer.yml
#         Enable GitOps updates (poll) or use a webhook.
#   2. Environment variables (set in the stack UI, not committed):
#         DATABASE_URL            postgres://user:pass@host:5432/dbname
#         SESSION_SECRET          openssl rand -base64 32
#         IMAGE_TAG               latest  (or pin to sha-abcdef1 for rollback)
#         SESSION_COOKIE_SECURE   "false" only when serving plain HTTP on a
#                                 trusted LAN (no reverse-proxy TLS). Default
#                                 in production is Secure-flag on, which means
#                                 browsers ignore the cookie over HTTP and the
#                                 user gets bounced to /login after sign-in.
#         PROXY_NETWORK           name of the external Docker network shared
#                                 with the reverse proxy (e.g. Nginx Proxy
#                                 Manager). Leave unset for direct host-port
#                                 access only.
#   3. Pull the image once before first deploy if GHCR package is private.
#
# Migrations run automatically at container start (scripts/docker-entrypoint.sh).

services:
  app:
    image: ghcr.io/blainemincey/the-reality-checkbook:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      NODE_ENV: production
      PORT: "3000"
    # No host port published. The app is reachable only through the reverse
    # proxy on PROXY_NETWORK at http://app:3000. To expose a host port for
    # direct/emergency access, add a `ports: ["${APP_PORT:-3000}:3000"]` block.
    # Postgres runs on the NAS host, not in a container. host-gateway resolves
    # `host.docker.internal` to the Docker bridge IP of the host so the app can
    # reach it. DATABASE_URL should use `host.docker.internal` as the hostname.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Named volume so the stack is independent of Portainer's working dir.
      # Logos baked into the image (public/institutions/*) are copied in on
      # first start because the volume mounts over an existing directory only
      # after Docker seeds it from the image. To re-seed after adding new
      # baked-in logos, remove the volume and redeploy.
      - institutions:/app/public/institutions
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/login').then(r =>
          process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    # The app is reachable from the reverse proxy (e.g. Nginx Proxy Manager)
    # at http://app:3000 over the shared external network named by
    # PROXY_NETWORK. The stack-local `default` network is kept for any future
    # in-stack services.
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK}

volumes:
  institutions:
