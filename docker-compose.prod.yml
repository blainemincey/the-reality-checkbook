# Production compose for home-server/NAS deployment.
# Build and run: `docker compose -f docker-compose.prod.yml up -d --build`

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    # No ports exposed to host — app reaches db over the internal network.
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      PORT: '3000'
    ports:
      - '${APP_PORT:-3000}:3000'
    networks:
      - internal

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      PGHOST: db
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ['/bin/sh', '-c', 'crond -f -l 8']
    networks:
      - internal
    # NOTE: crontab is baked into the image in a real deploy. See scripts/backup.sh
    # for the intended cron line. Wire it up before relying on it.

networks:
  internal:
    driver: bridge

volumes:
  db_data:
