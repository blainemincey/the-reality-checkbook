# Production compose for a home-server/NAS deployment.
# Assumes an external Postgres (e.g. already-running instance on another host).
#
# .env must provide:
#   DATABASE_URL     postgres://user:pass@host:5432/dbname
#   SESSION_SECRET   openssl rand -base64 32
#   APP_PORT         host port to expose (default 3000)
#
# Bring up:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Migrations apply automatically at container start (see scripts/docker-
# entrypoint.sh). If they fail, the container exits and Docker will retry per
# restart policy.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mincey-finances:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # Persist user-uploaded institution logos across image rebuilds. The
      # host path is created (empty) on first `up` if it doesn't exist; any
      # logos already committed to the repo's public/institutions/ will be
      # present if you bring up from the repo checkout.
      - ./public/institutions:/app/public/institutions
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/login').then(r =>
          process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
